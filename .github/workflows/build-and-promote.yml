name: Build and Promote

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build and promote (e.g. v1.2.3)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/matiasmartin-labs/auth-provider-ms

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          platforms: linux/arm64

  promote:
    name: Promote K8s Manifests
    runs-on: ubuntu-24.04-arm
    needs: build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi
      - name: Render K8s manifests
        uses: matiasmartin-labs/gha-deployments/k8s-renderer@main
        with:
          input-dir: ./k8s
          output-dir: ./k8s/manifests
          version: ${{ steps.version.outputs.VERSION }}
          docker-registry: ghcr.io/matiasmartin-labs
          image-pull-secret: ghcr-secret
          branch: ${{ github.ref }}

      - name: Git Config
        run: |
          git config --global user.name "Action"
          git config --global user.email "action@github.com"

      - name: Checkout k8s-manifests branch
        run: |
          git fetch origin k8s-manifests
          git switch k8s-manifests
          
          git checkout -b "deploy-pr-${{ steps.version.outputs.VERSION }}"

      - name: Move manifests to root directory
        run: |
          mv ./k8s/manifests/* ./
          rm -r ./k8s

      - name: Commit and Push manifests
        run: |
          git add ./*.yml
          git commit -m "Promote Kubernetes manifests for version ${{ steps.version.outputs.VERSION }}"
          git push origin "deploy-pr-${{ steps.version.outputs.VERSION }}"

      - name: Create a PR for the manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Promote Kubernetes Manifests for version ${{ steps.version.outputs.VERSION }}" \
            --body "This PR adds Kubernetes manifests for version ${{ steps.version.outputs.VERSION }}." \
            --base k8s-manifests \
            --head "deploy-pr-${{ steps.version.outputs.VERSION }}" \
            --repo ${{ github.repository }}

